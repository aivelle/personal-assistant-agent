name: Auto Copy personal-assistant-agent to .github/actions

on:
  workflow_dispatch:

jobs:
  copy-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Clone personal-assistant-agent repository
        run: |
          git clone https://github.com/aivelle/personal-assistant-agent.git temp-agent

      - name: Ensure .github/actions directory exists
        run: mkdir -p .github/actions

      - name: Copy all files from personal-assistant-agent to .github/actions/
        run: |
          shopt -s dotglob
          cp -r temp-agent/* .github/actions/
          shopt -u dotglob

      - name: Show the result
        run: ls -alR .github/actions/
