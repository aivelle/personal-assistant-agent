name: Auto Copy personal-assistant-agent to .github/actions (reset)

on:
  workflow_dispatch:

permissions:
  contents: write
  workflows: write

jobs:
  copy-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Clone personal-assistant-agent repository
        run: git clone https://github.com/aivelle/personal-assistant-agent.git temp-agent

      - name: Ensure .github/actions directory exists
        run: mkdir -p .github/actions

      - name: Copy all files from personal-assistant-agent to .github/actions/
        run: |
          shopt -s dotglob
          cp -r temp-agent/* .github/actions/
          shopt -u dotglob

      - name: Show copied result
        run: ls -alR .github/actions/

      - name: Commit and push copied files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add .github/actions
          git commit -m "Auto copy personal-assistant-agent to .github/actions" || echo "Nothing to commit"
          git push

          git push

# fix: reset with fresh workflow file
