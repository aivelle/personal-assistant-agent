name: Auto Copy personal-assistant-agent to .github/actions (reset)

on:
  # Allows manual trigger from GitHub UI
  workflow_dispatch:

# Required to allow the action to commit and push files
permissions:
  contents: write
  workflows: write

jobs:
  copy-agent:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the current repository
      - name: Checkout current repository
        uses: actions/checkout@v4

      # Step 2: Clone the external source repository
      - name: Clone personal-assistant-agent repository
        run: git clone https://github.com/aivelle/personal-assistant-agent.git temp-agent

      # Step 3: Ensure the destination folder exists
      - name: Ensure .github/actions directory exists
        run: mkdir -p .github/actions

      # Step 4: Copy all files (including dotfiles) from source to destination
      - name: Copy all files from personal-assistant-agent to .github/actions/
        run: |
          shopt -s dotglob
          cp -r temp-agent/* .github/actions/
          shopt -u dotglob

      # Step 5: Show copied files in the GitHub Actions log
      - name: Show copied result
        run: ls -alR .github/actions/

      # Step 6: Commit and push the copied files to the repository
      - name: Commit and push copied files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add .github/actions
          git commit -m "Auto copy personal-assistant-agent to .github/actions" || echo "Nothing to commit"
          git push || echo "Push skipped (no changes or auth issue)"
